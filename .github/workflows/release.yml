name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build and package
        run: ./scripts/package_app.sh ${{ github.ref_name }}

      - name: Create release
        run: |
          gh release create ${{ github.ref_name }} \
            Tidy-${{ github.ref_name }}-macos.dmg \
            --title "Tidy ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update homebrew tap
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DMG="Tidy-${VERSION}-macos.dmg"
          ./scripts/update_homebrew_tap.sh "$VERSION" "$DMG"
